<!DOCTYPE html>
<html>
<head>
    <title>Employee Salary Management</title>
</head>

<body>

<!-- HTML PART -->
<div class="container">
    <h2>Employee Salary Management System</h2>

    <input type="text" id="name" placeholder="Employee Name"><br>
    <input type="text" id="empId" placeholder="Employee ID"><br>
    <input type="number" id="salary" placeholder="Salary"><br>
    <input type="text" id="dept" placeholder="Department"><br>

    <button onclick="addEmployee()">Add Employee</button>
    <button onclick="displayEmployees()">Display All</button>
    <button onclick="filterSalary()">Salary > 50000</button>
    <button onclick="totalSalary()">Total Salary</button>
    <button onclick="averageSalary()">Average Salary</button>
    <button onclick="countDepartment()">Count by Department</button>

    <div id="output"></div>
</div>

<!-- CSS PART -->
<style>
    body {
        font-family: Arial;
        background-color: #eef2f3;
        text-align: center;
    }

    .container {
        width: 650px;
        margin: 40px auto;
        padding: 20px;
        background: white;
        border-radius: 10px;
        box-shadow: 0 0 10px gray;
    }

    input {
        padding: 8px;
        margin: 5px;
    }

    button {
        padding: 8px 12px;
        margin: 5px;
        background-color: #28a745;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
    }

    button:hover {
        background-color: #1e7e34;
    }

    #output {
        margin-top: 20px;
        text-align: left;
    }
</style>

<!-- JS PART -->
<script>
let employees = [];

function addEmployee() {
    let name = document.getElementById("name").value;
    let empId = document.getElementById("empId").value;
    let salary = parseFloat(document.getElementById("salary").value);
    let dept = document.getElementById("dept").value;

    if (name === "" || empId === "" || isNaN(salary) || dept === "") {
        alert("Please fill all fields properly");
        return;
    }

    let employee = {
        name: name,
        id: empId,
        salary: salary,
        department: dept
    };

    employees.push(employee);
    alert("Employee Added Successfully!");

    document.getElementById("name").value = "";
    document.getElementById("empId").value = "";
    document.getElementById("salary").value = "";
    document.getElementById("dept").value = "";
}

function displayEmployees() {
    let output = "<h3>All Employees</h3>";

    employees.forEach(emp => {
        output += `
        Name: ${emp.name} |
        ID: ${emp.id} |
        Salary: ₹${emp.salary} |
        Dept: ${emp.department} <br>
        `;
    });

    document.getElementById("output").innerHTML = output;
}

function filterSalary() {
    let filtered = employees.filter(emp => emp.salary > 50000);
    let output = "<h3>Employees with Salary > 50,000</h3>";

    filtered.forEach(emp => {
        output += `
        Name: ${emp.name} |
        Salary: ₹${emp.salary} <br>
        `;
    });

    document.getElementById("output").innerHTML = output;
}

function totalSalary() {
    let total = employees.reduce((sum, emp) => sum + emp.salary, 0);

    document.getElementById("output").innerHTML =
        "<h3>Total Salary Payout: ₹" + total + "</h3>";
}

function averageSalary() {
    if (employees.length === 0) {
        document.getElementById("output").innerHTML =
            "<h3>No employee records available</h3>";
        return;
    }

    let total = employees.reduce((sum, emp) => sum + emp.salary, 0);
    let avg = total / employees.length;

    document.getElementById("output").innerHTML =
        "<h3>Average Salary: ₹" + avg.toFixed(2) + "</h3>";
}

function countDepartment() {
    let deptName = prompt("Enter Department Name:");
    let count = employees.filter(emp => emp.department === deptName).length;

    document.getElementById("output").innerHTML =
        "<h3>Employees in " + deptName + ": " + count + "</h3>";
}
</script>

</body>
</html>
